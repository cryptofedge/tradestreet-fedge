name: FEDGE 2.O — CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ---- LINT & TYPE CHECK ----
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm --filter @tradestreet/types build
      - run: pnpm --filter @tradestreet/api tsc --noEmit
      - run: pnpm --filter @tradestreet/mobile tsc --noEmit

  # ---- API TESTS ----
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: fedge, POSTGRES_PASSWORD: fedge, POSTGRES_DB: tradestreet_test }
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @tradestreet/api test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://fedge:fedge@localhost:5432/tradestreet_test
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}

  # ---- BUILD API DOCKER IMAGE ----
  build-api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: test-api
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: |
            eclatuniverse/fedge-api:latest
            eclatuniverse/fedge-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- EXPO MOBILE BUILD ----
  build-mobile:
    name: Build Mobile (EAS)
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - working-directory: apps/mobile
        run: eas build --platform all --non-interactive --profile production
        env:
          EXPO_PUBLIC_API_URL: https://api.fedge.io/v2
